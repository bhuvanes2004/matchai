{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card animate-in">
        <div class="text-center mb-4">
            <div class="mb-3">
                <span class="d-inline-flex align-items-center justify-content-center rounded-circle" style="width:60px;height:60px;background:var(--primary-bg)">
                    <i class="fas fa-sign-in-alt text-primary" style="font-size:1.5rem"></i>
                </span>
            </div>
            <h2>Welcome Back</h2>
            <p class="text-muted">Sign in to your MatchAI account</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label-custom" for="email">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control border-start-0" id="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-custom" for="password">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-2 mt-2">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
        </form>
        <div class="text-center mt-4">
            <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="fw-semibold">Create one</a></p>
        </div>
        <hr class="my-4">
        <div class="text-center">
            <p class="text-muted small mb-2">Demo Accounts:</p>
            <div class="small text-muted">
                <div><strong>Candidate:</strong> alice@matchai.com / candidate123</div>
                <div><strong>Recruiter:</strong> recruiter@matchai.com / recruiter123</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
