{% extends "base.html" %}
{% block title %}Post a Job{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:800px">
    <a href="{{ url_for('recruiter_dashboard') }}" class="btn btn-sm btn-outline-custom mb-4">
        <i class="fas fa-arrow-left me-1"></i>Back to Dashboard
    </a>

    <div class="form-section">
        <h4><i class="fas fa-plus-circle text-primary me-2"></i>Post a New Job</h4>
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label-custom">Job Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="title" placeholder="e.g. Senior Python Developer" required>
                </div>
                <div class="col-12">
                    <label class="form-label-custom">Description <span class="text-danger">*</span></label>
                    <textarea class="form-control" name="description" rows="6" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
                </div>
                <div class="col-12">
                    <label class="form-label-custom">Required Skills <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="skills_required" placeholder="e.g. Python, Django, PostgreSQL, Docker" required>
                    <small class="text-muted">Separate skills with commas</small>
                </div>
                <div class="col-md-6">
                    <label class="form-label-custom">Location</label>
                    <input type="text" class="form-control" name="location" placeholder="e.g. San Francisco, CA or Remote">
                </div>
                <div class="col-md-6">
                    <label class="form-label-custom">Salary Range</label>
                    <input type="text" class="form-control" name="salary" placeholder="e.g. $120,000 - $160,000">
                </div>
                <div class="col-md-6">
                    <label class="form-label-custom">Job Type</label>
                    <select class="form-select" name="job_type">
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Contract">Contract</option>
                        <option value="Remote">Remote</option>
                        <option value="Internship">Internship</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom btn-lg w-100 mt-4">
                <i class="fas fa-paper-plane me-2"></i>Publish Job
            </button>
        </form>
    </div>
</div>
{% endblock %}
